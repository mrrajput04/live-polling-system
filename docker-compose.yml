services:
  backend:
    build:
      context: ./backend
    container_name: polling-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - SESSION_SECRET=poll-secret

  frontend:
    build:
      context: ./frontend
    container_name: polling-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
